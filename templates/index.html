<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>HW1 Grid Map & Policy Evaluation</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .grid-container { display: grid; gap: 2px; margin-top: 15px; width: fit-content; }
        .cell {
            width: 50px; height: 50px; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px; font-weight: bold; background-color: white;
            user-select: none;
        }
        .start { background-color: #228B22; color: white; }
        .end { background-color: #DC143C; color: white; }
        .obstacle { background-color: #696969; color: transparent; }
        
        .results-section { display: flex; gap: 40px; margin-top: 30px; }
        .res-grid { display: grid; gap: 2px; width: fit-content; border: 2px solid #005A9C; background-color: #005A9C; }
        .res-cell {
            width: 50px; height: 50px; background-color: white;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }
        .res-obs { background-color: gray; }
        .highlight-start { border: 3px solid green; box-sizing: border-box; }
        .highlight-end { border: 3px solid red; box-sizing: border-box; }
        /* 最佳路徑的背景色（淺綠色） */
        .optimal-path { background-color: #90EE90 !important; }
    </style>
</head>
<body>

    <h2>Generate n x n Square</h2>
    <label>Enter a number between 5 and 9: 
        <input type="number" id="n-input" min="5" max="9" value="5">
    </label>
    <button onclick="initGrid()">Generate Square</button>

    <h3 id="instruction-text">1. Enter n and click 'Generate Square'</h3>
    <div id="main-grid" class="grid-container"></div>

    <div id="results" class="results-section" style="display: none;">
        <div>
            <h3 style="text-align: center;">Value Matrix</h3>
            <div id="value-grid" class="res-grid"></div>
        </div>
        <div>
            <h3 style="text-align: center;">Policy Matrix</h3>
            <div id="policy-grid" class="res-grid"></div>
        </div>
    </div>

    <script>
        let n = 5;
        let step = 0; // 0: 設起點, 1: 設終點, 2: 設障礙物
        let startCell = null;
        let endCell = null;
        let obstacles = [];

        function initGrid() {
            n = parseInt(document.getElementById('n-input').value);
            if (n < 5 || n > 9) {
                alert("Please enter a valid number between 5 and 9.");
                return;
            }

            step = 0; startCell = null; endCell = null; obstacles = [];
            document.getElementById('results').style.display = 'none';
            document.getElementById('instruction-text').innerText = "1. Click on a cell to set up the START grid as green.";

            const grid = document.getElementById('main-grid');
            grid.style.gridTemplateColumns = `repeat(${n}, 50px)`;
            grid.innerHTML = '';

            let counter = 1;
            for (let r = 0; r < n; r++) {
                for (let c = 0; c < n; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = counter++;
                    cell.onclick = () => handleCellClick(cell, r, c);
                    grid.appendChild(cell);
                }
            }
        }

        function handleCellClick(cell, r, c) {
            if (step === 0) {
                startCell = [r, c];
                cell.classList.add('start');
                step++;
                document.getElementById('instruction-text').innerText = "2. Click on a cell to set up the END grid as red.";
            } 
            else if (step === 1) {
                if (r === startCell[0] && c === startCell[1]) return;
                endCell = [r, c];
                cell.classList.add('end');
                step++;
                document.getElementById('instruction-text').innerText = `3. Click to set ${n-2} OBSTACLES as gray. (0/${n-2})`;
            } 
            else if (step === 2) {
                if ((r === startCell[0] && c === startCell[1]) || (r === endCell[0] && c === endCell[1])) return;
                if (obstacles.some(o => o[0] === r && o[1] === c)) return;

                obstacles.push([r, c]);
                cell.classList.add('obstacle');
                document.getElementById('instruction-text').innerText = `3. Click to set ${n-2} OBSTACLES as gray. (${obstacles.length}/${n-2})`;

                if (obstacles.length === n - 2) {
                    step++;
                    document.getElementById('instruction-text').innerText = "Calculating Policy and Values...";
                    fetchEvaluation();
                }
            }
        }

        function fetchEvaluation() {
            fetch('/evaluate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ n, start: startCell, end: endCell, obstacles })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('instruction-text').innerText = "Computation Complete!";
                renderResults(data.values, data.policy, data.optimal_path);
            });
        }

        function renderResults(values, policy, optimalPath) {
            document.getElementById('results').style.display = 'flex';
            const vGrid = document.getElementById('value-grid');
            const pGrid = document.getElementById('policy-grid');

            vGrid.style.gridTemplateColumns = `repeat(${n}, 50px)`;
            pGrid.style.gridTemplateColumns = `repeat(${n}, 50px)`;
            vGrid.innerHTML = ''; pGrid.innerHTML = '';

            for (let r = 0; r < n; r++) {
                for (let c = 0; c < n; c++) {
                    const vCell = document.createElement('div');
                    const pCell = document.createElement('div');
                    vCell.className = 'res-cell';
                    pCell.className = 'res-cell';

                    if (values[r][c] === 'X') {
                        vCell.classList.add('res-obs');
                        pCell.classList.add('res-obs');
                    } else {
                        vCell.innerText = values[r][c];
                        pCell.innerText = policy[r][c];
                        
                        // 標記最佳路徑 (淺綠色)
                        const isOptimal = optimalPath.some(pos => pos[0] === r && pos[1] === c);
                        if (isOptimal) {
                            vCell.classList.add('optimal-path');
                            pCell.classList.add('optimal-path');
                        }

                        // 標記起點與終點邊框以便對照
                        if (r === startCell[0] && c === startCell[1]) {
                            vCell.classList.add('highlight-start');
                            pCell.classList.add('highlight-start');
                        }
                        if (r === endCell[0] && c === endCell[1]) {
                            vCell.classList.add('highlight-end');
                            pCell.classList.add('highlight-end');
                        }
                    }

                    vGrid.appendChild(vCell);
                    pGrid.appendChild(pCell);
                }
            }
        }
    </script>
</body>
</html>
